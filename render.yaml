# Render Blueprint — FREE, TEMPORARY Funduqii demo (show-to-hotels feedback).
#
# Minimal single-process topology for the free tier:
#   * ONE free PostgreSQL database.
#   * ONE Python web service (Django + gunicorn) — NO Celery worker, NO daphne.
#     Celery runs EAGER (inline) and Channels/cache fall back to in-memory
#     because REDIS_URL / CHANNEL_LAYER_REDIS_URL are intentionally left UNSET.
#   * ONE Node web service (Next.js) — the browser only talks to this; it proxies
#     to the API server-side via API_INTERNAL_BASE_URL.
#
# Free-tier caveats: web services SLEEP after ~15 min idle (first hit ~50s cold
# start); the free Postgres expires after ~30 days. Demo/sample data only.
#
# If you rename either web service, update API_INTERNAL_BASE_URL (web) and
# CORS_ALLOWED_ORIGINS (api) to match the new https://<name>.onrender.com URLs.

databases:
  - name: funduqii-demo-db
    plan: free
    region: oregon

services:
  # --- Django API (gunicorn, WSGI) ------------------------------------------
  - type: web
    name: funduqii-demo-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "pip install -r requirements/production.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: funduqii-demo-db
          property: connectionString
      # Django leading-dot wildcard: matches any *.onrender.com host, so the
      # exact service host does not need to be known ahead of time.
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # No broker/worker on free tier → run tasks inline.
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      # Render terminates TLS at the edge; disabling the app-level redirect
      # avoids a health-check redirect loop.
      - key: SECURE_SSL_REDIRECT
        value: "false"
      - key: DJANGO_LOG_LEVEL
        value: "INFO"
      # The frontend origin allowed to call the API (must match the web URL).
      - key: CORS_ALLOWED_ORIGINS
        value: "https://funduqii-demo-web.onrender.com"

  # --- Next.js frontend (BFF; the only thing the browser talks to) ----------
  - type: web
    name: funduqii-demo-web
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Server-side base URL the Next BFF uses to reach the Django API.
      - key: API_INTERNAL_BASE_URL
        value: "https://funduqii-demo-api.onrender.com/api"
